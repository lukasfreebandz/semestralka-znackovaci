openapi: 3.1.0
info:
  title: Back From The Dead Fest API
  version: 1.0.0
  description: Staticka ukazka REST API nad XML databazi festivalu.
servers:
  - url: https://example.com
paths:
  /api/festival: { get: { summary: Vrati zakladni identitu festivalu, responses: { '200': { description: OK, content: { application/json: { schema: { $ref: './json-schema/festival.schema.json' } } } }, '400': { description: Chybny pozadavek, content: { application/json: { schema: { type: object, properties: { error: { type: string } } } } } }, '404': { description: Nenalezeno, content: { application/json: { schema: { type: object, properties: { error: { type: string } } } } } } } } }
  /api/venues: { get: { summary: Vrati seznam scen, responses: { '200': { description: OK, content: { application/json: { schema: { $ref: './json-schema/venues.schema.json' } } } }, '400': { description: Chybny pozadavek, content: { application/json: { schema: { type: object, properties: { error: { type: string } } } } } }, '404': { description: Nenalezeno, content: { application/json: { schema: { type: object, properties: { error: { type: string } } } } } } } } }
  /api/venues/{id}: { get: { summary: Vrati detail jedne sceny, parameters: [ { name: id, in: path, required: true, schema: { type: string, pattern: '^V\d{3}$' } } ], responses: { '200': { description: OK, content: { application/json: { schema: { $ref: './json-schema/venue.schema.json' } } } }, '400': { description: Neplatne ID sceny, content: { application/json: { schema: { type: object, properties: { error: { type: string } } } } } }, '404': { description: Scena nebyla nalezena, content: { application/json: { schema: { type: object, properties: { error: { type: string } } } } } } } } }
  /api/performers: { get: { summary: Vrati strankovany seznam ucinkujicich, parameters: [ { name: page, in: query, schema: { type: integer, minimum: 1 } }, { name: pageSize, in: query, schema: { type: integer, minimum: 1, maximum: 60 } } ], responses: { '200': { description: OK, content: { application/json: { schema: { $ref: './json-schema/performers.schema.json' } } } }, '400': { description: Neplatne strankovani, content: { application/json: { schema: { type: object, properties: { error: { type: string } } } } } }, '404': { description: Nenalezeno, content: { application/json: { schema: { type: object, properties: { error: { type: string } } } } } } } } }
  /api/performers/{id}: { get: { summary: Vrati detail jednoho ucinkujiciho, parameters: [ { name: id, in: path, required: true, schema: { type: string, pattern: '^P\d{3}$' } } ], responses: { '200': { description: OK, content: { application/json: { schema: { $ref: './json-schema/performer.schema.json' } } } }, '400': { description: Neplatne ID ucinkujiciho, content: { application/json: { schema: { type: object, properties: { error: { type: string } } } } } }, '404': { description: Ucinkujici nebyl nalezen, content: { application/json: { schema: { type: object, properties: { error: { type: string } } } } } } } } }
  /api/events: { get: { summary: Vrati program festivalu, parameters: [ { name: day, in: query, schema: { type: string, format: date } }, { name: venueId, in: query, schema: { type: string, pattern: '^V\d{3}$' } }, { name: performerId, in: query, schema: { type: string, pattern: '^P\d{3}$' } } ], responses: { '200': { description: OK, content: { application/json: { schema: { $ref: './json-schema/events.schema.json' } } } }, '400': { description: Neplatne filtry, content: { application/json: { schema: { type: object, properties: { error: { type: string } } } } } }, '404': { description: Program nebyl nalezen, content: { application/json: { schema: { type: object, properties: { error: { type: string } } } } } } } } }
  /api/events/{id}: { get: { summary: Vrati detail jedne programove polozky, parameters: [ { name: id, in: path, required: true, schema: { type: string, pattern: '^E\d{3}$' } } ], responses: { '200': { description: OK, content: { application/json: { schema: { $ref: './json-schema/event.schema.json' } } } }, '400': { description: Neplatne ID udalosti, content: { application/json: { schema: { type: object, properties: { error: { type: string } } } } } }, '404': { description: Udalost nebyla nalezena, content: { application/json: { schema: { type: object, properties: { error: { type: string } } } } } } } } }

